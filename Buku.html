<!-- 
  Pustaka Digital Premium - Buku Panel (Buku.html)
  Robust Books Catalog with Real-time Filtering, Upload Drawer & Info Modal
-->

<div class="space-y-6">
  <!-- Header Bar -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h1 class="text-3xl font-extrabold text-slate-800 dark:text-white">Katalog Buku Digital</h1>
      <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">
        Jelajahi, cari, dan pelajari materi literatur PDF berkualitas premium secara langsung.
      </p>
    </div>
    
    <!-- Admin-only Add Book -->
    <button onclick="openBookModal()" class="premium-glow-button px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 text-sm self-start md:self-auto admin-only">
      <i class="fas fa-plus"></i>
      <span>Tambah Buku</span>
    </button>
  </div>

  <!-- Search & Filter Controls -->
  <div class="glass-panel p-4 flex flex-col md:flex-row gap-4 items-center justify-between">
    <!-- Real-time Search Input -->
    <div class="relative w-full md:max-w-md">
      <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
        <i class="fas fa-search"></i>
      </span>
      <input type="text" id="search-book-input" onkeyup="filterBooksCatalog()" placeholder="Cari judul, penulis, penerbit..." 
        class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 bg-white/70 dark:bg-slate-900/70 text-slate-800 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" />
    </div>

    <!-- Category Filter -->
    <div class="flex items-center gap-2 w-full md:w-auto">
      <label class="text-sm font-semibold text-slate-600 dark:text-slate-400 whitespace-nowrap"><i class="fas fa-filter mr-1"></i>Kategori:</label>
      <select id="filter-category-select" onchange="filterBooksCatalog()" 
        class="w-full md:w-48 px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 bg-white/70 dark:bg-slate-900/70 text-slate-800 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 transition-all">
        <option value="">Semua Kategori</option>
        <!-- Categories will load dynamically -->
      </select>
    </div>
  </div>

  <!-- Catalog Grid -->
  <div id="books-catalog-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
    <!-- Book Cards -->
    <div class="col-span-full py-20 flex flex-col items-center justify-center text-slate-400">
      <div class="glow-loader mb-4"></div>
      <p class="text-sm font-semibold">Memuat koleksi buku...</p>
    </div>
  </div>
  
  <!-- Pagination -->
  <div class="flex justify-center items-center gap-4 pt-4" id="books-pagination">
    <!-- Pagination buttons -->
  </div>
</div>

<!-- BOOK INFO DETAIL MODAL -->
<div id="book-detail-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm hidden">
  <div class="glass-panel w-full max-w-2xl overflow-hidden relative animate-fadeIn scale-95 transition-all" id="book-detail-card">
    <div class="absolute top-4 right-4 z-10">
      <button onclick="closeBookDetailModal()" class="w-8 h-8 rounded-full bg-slate-800/80 hover:bg-slate-800 text-white flex items-center justify-center transition-all">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-5 gap-6 p-6 md:p-8">
      <!-- Book Cover -->
      <div class="md:col-span-2 flex flex-col items-center">
        <img id="detail-book-cover" class="w-full max-w-[200px] h-72 object-cover rounded-xl shadow-lg border border-slate-200 dark:border-slate-700 mb-3" src="" />
        <span id="detail-book-category" class="px-3 py-1 text-xs font-bold rounded-full bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-400"></span>
      </div>

      <!-- Book Metadata -->
      <div class="md:col-span-3 flex flex-col justify-between space-y-4">
        <div>
          <h3 id="detail-book-judul" class="text-2xl font-black text-slate-800 dark:text-white leading-tight"></h3>
          <p id="detail-book-penulis" class="text-sm font-bold text-slate-500 dark:text-slate-400 mt-1"></p>
        </div>

        <div class="grid grid-cols-2 gap-4 text-xs bg-slate-100/50 dark:bg-slate-800/50 p-3 rounded-xl">
          <div>
            <span class="text-slate-400 block font-semibold">Penerbit:</span>
            <span id="detail-book-penerbit" class="text-slate-700 dark:text-slate-300 font-bold"></span>
          </div>
          <div>
            <span class="text-slate-400 block font-semibold">Tahun Terbit:</span>
            <span id="detail-book-tahun" class="text-slate-700 dark:text-slate-300 font-bold"></span>
          </div>
          <div>
            <span class="text-slate-400 block font-semibold">Kali Dibaca:</span>
            <span id="detail-book-dibaca" class="text-slate-700 dark:text-slate-300 font-bold"></span>
          </div>
          <div>
            <span class="text-slate-400 block font-semibold">Tanggal Upload:</span>
            <span id="detail-book-upload" class="text-slate-700 dark:text-slate-300 font-bold"></span>
          </div>
        </div>

        <div class="space-y-1">
          <span class="text-xs font-bold text-slate-400 block">Deskripsi Singkat:</span>
          <p id="detail-book-deskripsi" class="text-sm text-slate-600 dark:text-slate-300 max-h-36 overflow-y-auto leading-relaxed"></p>
        </div>

        <!-- Actions -->
        <div class="flex items-center gap-3 pt-3">
          <button id="btn-read-online" class="flex-1 py-3 text-white font-bold rounded-xl premium-glow-button text-sm flex items-center justify-center gap-2">
            <i class="fas fa-book-open"></i>
            <span>Baca Sekarang</span>
          </button>
          
          <button id="btn-download-pdf" class="py-3 px-4 bg-slate-200 hover:bg-slate-300 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-white font-bold rounded-xl text-sm flex items-center justify-center transition-all">
            <i class="fas fa-download"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- BOOK MANAGEMENT ADD/EDIT MODAL -->
<div id="book-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm hidden">
  <div class="glass-panel w-full max-w-lg overflow-hidden relative animate-fadeIn scale-95 transition-all" id="book-modal-card">
    <div class="p-6 border-b border-slate-200/50 dark:border-slate-800/50 flex items-center justify-between">
      <h3 id="book-modal-title" class="text-xl font-bold text-slate-800 dark:text-white">Tambah Buku PDF Baru</h3>
      <button onclick="closeBookModal()" class="w-8 h-8 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 hover:text-slate-800 dark:hover:text-white flex items-center justify-center transition-all">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <form id="form-book" onsubmit="handleBookSubmit(event)" class="p-6 space-y-4 max-h-[80vh] overflow-y-auto">
      <input type="hidden" id="book-id-field" />

      <!-- Title & Author -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="form-floating-custom">
          <input id="book-judul-input" type="text" placeholder="Judul Buku" required
            class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-700 bg-white/70 dark:bg-slate-900/70 text-slate-800 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all" />
          <label for="book-judul-input"><i class="fas fa-heading mr-2"></i>Judul Buku</label>
        </div>
        <div class="form-floating-custom">
          <input id="book-penulis-input" type="text" placeholder="Penulis" required
            class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-700 bg-white/70 dark:bg-slate-900/70 text-slate-800 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all" />
          <label for="book-penulis-input"><i class="fas fa-user-edit mr-2"></i>Penulis</label>
        </div>
      </div>

      <!-- Publisher & Year -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="form-floating-custom">
          <input id="book-penerbit-input" type="text" placeholder="Penerbit" required
            class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-700 bg-white/70 dark:bg-slate-900/70 text-slate-800 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all" />
          <label for="book-penerbit-input"><i class="fas fa-building mr-2"></i>Penerbit</label>
        </div>
        <div class="form-floating-custom">
          <input id="book-tahun-input" type="number" placeholder="Tahun Terbit" required min="1000" max="2030"
            class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-700 bg-white/70 dark:bg-slate-900/70 text-slate-800 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all" />
          <label for="book-tahun-input"><i class="fas fa-calendar mr-2"></i>Tahun Terbit</label>
        </div>
      </div>

      <!-- Category & Status Selection -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="text-xs font-semibold text-slate-500 px-1">Kategori Buku</label>
          <select id="book-kategori-input" required
            class="w-full px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 bg-white/70 dark:bg-slate-900/70 text-slate-800 dark:text-white focus:ring-2 focus:ring-blue-500 transition-all outline-none">
            <!-- Loading categories dynamically -->
          </select>
        </div>
        <div class="space-y-1">
          <label class="text-xs font-semibold text-slate-500 px-1">Status Publikasi</label>
          <select id="book-status-input" required
            class="w-full px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 bg-white/70 dark:bg-slate-900/70 text-slate-800 dark:text-white focus:ring-2 focus:ring-blue-500 transition-all outline-none">
            <option value="Aktif">Aktif</option>
            <option value="Nonaktif">Nonaktif</option>
          </select>
        </div>
      </div>

      <!-- Description -->
      <div class="form-floating-custom">
        <textarea id="book-deskripsi-input" placeholder="Deskripsi Singkat..." required rows="2"
          class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-700 bg-white/70 dark:bg-slate-900/70 text-slate-800 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all resize-none"></textarea>
        <label for="book-deskripsi-input"><i class="fas fa-align-left mr-2"></i>Deskripsi Singkat...</label>
      </div>

      <!-- Drag and Drop Image & PDF Uploader -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Cover Upload -->
        <div class="space-y-1">
          <label class="text-xs font-semibold text-slate-500 px-1">Cover Buku (Image)</label>
          <div class="border border-dashed border-slate-300 dark:border-slate-700 rounded-xl p-4 flex flex-col items-center justify-center bg-white/30 dark:bg-slate-900/30 relative hover:bg-blue-50/50 transition-all cursor-pointer" onclick="document.getElementById('book-cover-file').click()">
            <input type="file" id="book-cover-file" accept="image/*" class="hidden" onchange="previewBookCoverUpload(this)" />
            <i class="fas fa-image text-slate-400 text-2xl mb-2"></i>
            <span class="text-xs text-slate-500 text-center" id="cover-upload-text">Klik atau seret gambar cover</span>
            <img id="book-cover-upload-preview" class="absolute inset-0 w-full h-full object-cover rounded-xl hidden" />
          </div>
        </div>

        <!-- PDF Upload -->
        <div class="space-y-1">
          <label class="text-xs font-semibold text-slate-500 px-1">Dokumen Buku (PDF)</label>
          <div class="border border-dashed border-slate-300 dark:border-slate-700 rounded-xl p-4 flex flex-col items-center justify-center bg-white/30 dark:bg-slate-900/30 relative hover:bg-blue-50/50 transition-all cursor-pointer" onclick="document.getElementById('book-pdf-file').click()">
            <input type="file" id="book-pdf-file" accept="application/pdf" class="hidden" onchange="handleBookPdfUpload(this)" />
            <i class="fas fa-file-pdf text-rose-400 text-2xl mb-2"></i>
            <span class="text-xs text-slate-500 text-center" id="pdf-upload-text">Pilih atau Drag File PDF buku</span>
            <!-- Progress Bar -->
            <div id="pdf-progress-container" class="absolute bottom-2 left-4 right-4 hidden">
              <div class="w-full bg-slate-200 dark:bg-slate-700 h-1.5 rounded-full overflow-hidden">
                <div id="pdf-progress-bar" class="bg-blue-600 h-full w-0 transition-all"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex items-center gap-3 pt-3 border-t border-slate-200/50 dark:border-slate-800/50">
        <button type="button" onclick="closeBookModal()" class="flex-1 py-3 border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-300 font-semibold rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-all text-sm">
          Batal
        </button>
        <button type="submit" class="flex-1 py-3 text-white font-semibold rounded-xl premium-glow-button text-sm flex items-center justify-center gap-2">
          <span>Simpan Buku</span>
          <i class="fas fa-save"></i>
        </button>
      </div>
    </form>
  </div>
</div>
