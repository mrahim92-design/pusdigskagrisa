<!-- 
  Pustaka Digital Premium - Login Component (Login.html)
  Stunning Glassmorphic Auth Form with floating elements
-->

<div class="min-h-screen flex items-center justify-center px-4 py-12 relative overflow-hidden">
  
  <!-- Glowing Background Orbs -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl opacity-25 animate-pulse" style="animation-duration: 8s;"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-400 rounded-full mix-blend-multiply filter blur-3xl opacity-25 animate-pulse" style="animation-duration: 12s;"></div>

  <div class="max-w-md w-full z-10">
    <div class="glass-panel p-8 md:p-10 relative">
      
      <!-- Logo & Welcome -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-blue-500 to-indigo-600 text-white text-3xl shadow-lg shadow-blue-500/30 mb-4 animate-bounce" style="animation-duration: 3s;">
          <i class="fas fa-book-reader"></i>
        </div>
        <h2 class="text-3xl font-extrabold tracking-tight text-slate-800 dark:text-white" id="login-title">
          Pustaka Premium
        </h2>
        <p class="mt-2 text-sm text-slate-500 dark:text-slate-400">
          Perpustakaan Digital Realtime & Modern
        </p>
      </div>

      <!-- Auth Mode Tabs -->
      <div class="flex p-1 bg-slate-200/50 dark:bg-slate-800/50 rounded-xl mb-6">
        <button id="tab-login" class="flex-1 py-2 text-sm font-semibold rounded-lg transition-all duration-200 text-blue-600 dark:text-blue-400 bg-white dark:bg-slate-900 shadow-sm" onclick="switchAuthTab('login')">
          Masuk
        </button>
        <button id="tab-register" class="flex-1 py-2 text-sm font-semibold rounded-lg transition-all duration-200 text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200" onclick="switchAuthTab('register')">
          Daftar Anggota
        </button>
      </div>

      <!-- LOGIN FORM -->
      <form id="form-login" onsubmit="handleLoginSubmit(event)" class="space-y-5">
        <div class="form-floating-custom">
          <input id="login-username" type="text" placeholder="Username" required 
            class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-700 bg-white/70 dark:bg-slate-900/70 text-slate-800 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all" />
          <label for="login-username"><i class="fas fa-user mr-2"></i>Username</label>
        </div>

        <div class="form-floating-custom">
          <input id="login-password" type="password" placeholder="Password" required 
            class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-700 bg-white/70 dark:bg-slate-900/70 text-slate-800 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all" />
          <label for="login-password"><i class="fas fa-lock mr-2"></i>Password</label>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input id="remember-me" type="checkbox" 
              class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 rounded" checked />
            <label for="remember-me" class="ml-2 block text-sm text-slate-600 dark:text-slate-400 cursor-pointer select-none">
              Ingat Saya
            </label>
          </div>
        </div>

        <div>
          <button type="submit" class="w-full py-3.5 px-4 rounded-xl font-bold premium-glow-button text-white flex items-center justify-center gap-2">
            <span>Masuk ke Akun</span>
            <i class="fas fa-arrow-right text-xs"></i>
          </button>
        </div>
      </form>

      <!-- REGISTRATION FORM (Hidden by default) -->
      <form id="form-register" onsubmit="handleRegisterSubmit(event)" class="space-y-4 hidden">
        <div class="form-floating-custom">
          <input id="reg-nama" type="text" placeholder="Nama Lengkap" required 
            class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-700 bg-white/70 dark:bg-slate-900/70 text-slate-800 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all" />
          <label for="reg-nama"><i class="fas fa-id-card mr-2"></i>Nama Lengkap</label>
        </div>

        <div class="form-floating-custom">
          <input id="reg-username" type="text" placeholder="Username" required 
            class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-700 bg-white/70 dark:bg-slate-900/70 text-slate-800 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all" />
          <label for="reg-username"><i class="fas fa-user mr-2"></i>Username</label>
        </div>

        <div class="form-floating-custom">
          <input id="reg-password" type="password" placeholder="Password" required 
            class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-700 bg-white/70 dark:bg-slate-900/70 text-slate-800 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all" />
          <label for="reg-password"><i class="fas fa-lock mr-2"></i>Password</label>
        </div>

        <div class="form-floating-custom">
          <input id="reg-kelas" type="text" placeholder="Kelas / Jabatan" required 
            class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-700 bg-white/70 dark:bg-slate-900/70 text-slate-800 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all" />
          <label for="reg-kelas"><i class="fas fa-graduation-cap mr-2"></i>Kelas (e.g. XII-IPA / Umum)</label>
        </div>

        <div class="space-y-1">
          <label class="text-xs font-semibold text-slate-500 dark:text-slate-400 px-1">Unggah Foto Profil (Opsional)</label>
          <div class="flex items-center gap-3">
            <label class="flex items-center gap-2 px-4 py-2 border border-dashed border-slate-300 dark:border-slate-700 rounded-lg cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 transition-all text-sm text-slate-600 dark:text-slate-400">
              <i class="fas fa-camera"></i>
              <span>Pilih Foto</span>
              <input type="file" id="reg-foto" accept="image/*" class="hidden" onchange="previewRegFoto(this)" />
            </label>
            <div id="reg-foto-preview-container" class="hidden">
              <img id="reg-foto-preview" class="w-10 h-10 rounded-full object-cover border border-blue-500" />
            </div>
          </div>
        </div>

        <div>
          <button type="submit" class="w-full py-3.5 px-4 rounded-xl font-bold premium-glow-button text-white flex items-center justify-center gap-2">
            <span>Daftar Sekarang</span>
            <i class="fas fa-user-plus text-xs"></i>
          </button>
        </div>
      </form>
      
      <!-- Informational Demo Accounts Hint -->
      <div class="mt-6 pt-4 border-t border-slate-200/50 dark:border-slate-800/50 text-center">
        <p class="text-xs text-slate-400 dark:text-slate-500 leading-relaxed">
          Akun Demo:<br>
          <span class="font-semibold">Admin:</span> admin / admin123 | <span class="font-semibold">Pembaca:</span> pembaca / pembaca123
        </p>
      </div>

    </div>
  </div>
</div>
