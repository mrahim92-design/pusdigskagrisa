<script>
/**
 * Pustaka Digital Premium - Core JavaScript Engine (Script.html)
 * SPA Router, Authentication Session, PDF.js integration, Digital ID printing, 
 * SheetJS exporting, and complete Offline Mocking Fallback.
 */

// Global App State Variables
let currentUser = null;
let appSettings = {
  libraryName: "Pustaka Digital Premium",
  themeColor: "blue",
  logoUrl: "",
  allowDownload: true
};

// Data Cache
let cacheBooks = [];
let cacheCategories = [];
let cacheMembers = [];
let cacheHistory = [];

// PDF Reader Variables
let pdfDoc = null;
let pdfPageNum = 1;
let pdfScale = 1.0;
let pdfCanvas = null;
let pdfCtx = null;
let pdfIsLoading = false;
let pdfCurrentBookId = null;
let pdfCurrentBookTitle = "";

// PWA installation trigger
let deferredPrompt = null;

// ==================== INITIALIZATION ====================

window.addEventListener('DOMContentLoaded', () => {
  pdfCanvas = document.getElementById('pdf-render-canvas');
  if (pdfCanvas) pdfCtx = pdfCanvas.getContext('2d');
  
  // Set current date on dashboard
  const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('dashboard-current-date').innerText = new Date().toLocaleDateString('id-ID', dateOptions);

  // Initialize Dark Mode from localStorage preference
  if (localStorage.getItem('pustaka-theme') === 'dark') {
    document.documentElement.classList.add('dark');
  }

  // Session checking
  checkAuthSession();
  
  // Listen for PWA Install Prompt
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('pwa-install-banner').classList.remove('hidden');
  });
});

/**
 * Validates authentication session in sessionStorage or localStorage
 */
function checkAuthSession() {
  const storedUser = sessionStorage.getItem('pustaka_user') || localStorage.getItem('pustaka_user');
  if (storedUser) {
    currentUser = JSON.parse(storedUser);
    setupAppLayout();
  } else {
    // Show login page
    document.getElementById('global-loader').classList.add('hidden');
    document.getElementById('app-viewport').classList.add('hidden');
    document.getElementById('auth-viewport').classList.remove('hidden');
  }
}

/**
 * Configure UI based on current logged in user and role access
 */
function setupAppLayout() {
  document.getElementById('auth-viewport').classList.add('hidden');
  document.getElementById('app-viewport').classList.remove('hidden');
  
  // Update sidebar and profile info
  document.getElementById('sidebar-user-name').innerText = currentUser.NAMA;
  document.getElementById('sidebar-user-role').innerText = currentUser.ROLE;
  
  if (currentUser.FOTO) {
    document.getElementById('sidebar-user-avatar').src = currentUser.FOTO;
    document.getElementById('prof-avatar-preview').src = currentUser.FOTO;
  } else {
    // Standard avatar placeholder
    const placeholder = `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.NAMA)}&background=3b82f6&color=fff&bold=true`;
    document.getElementById('sidebar-user-avatar').src = placeholder;
    document.getElementById('prof-avatar-preview').src = placeholder;
  }

  // Set Profile form fields
  document.getElementById('prof-nama-input').value = currentUser.NAMA;
  document.getElementById('prof-kelas-input').value = currentUser.KELAS;

  // Set Welcome Title
  document.getElementById('dashboard-welcome-title').innerText = `Selamat Datang, ${currentUser.NAMA}!`;

  // Hide or Show Administrator menus
  const adminElements = document.querySelectorAll('.admin-only');
  if (currentUser.ROLE === 'Admin') {
    adminElements.forEach(el => el.classList.remove('hidden'));
  } else {
    adminElements.forEach(el => el.classList.add('hidden'));
  }

  // Load backend configurations
  callBackend('getAppSettings', [], (res) => {
    if (res.success && res.data) {
      appSettings = res.data;
      applyBrandingSettings();
    }
    
    // Sync all databases
    syncData();
  });
}

function applyBrandingSettings() {
  document.getElementById('sidebar-lib-name').innerText = appSettings.libraryName;
  document.getElementById('card-lib-title').innerText = appSettings.libraryName;
  document.getElementById('set-lib-name').value = appSettings.libraryName;
  document.getElementById('set-logo-url').value = appSettings.logoUrl;
  document.getElementById('set-theme-color').value = appSettings.themeColor;
  document.getElementById('set-allow-download').value = String(appSettings.allowDownload);
}

// ==================== SPA ROUTING SYSTEM ====================

function navigateTo(viewId) {
  // Update Active Link classes in sidebar
  const links = document.querySelectorAll('.nav-link-custom');
  links.forEach(link => {
    link.classList.remove('text-blue-600', 'dark:text-blue-400', 'bg-slate-200/50', 'dark:bg-slate-800/50', 'active');
  });

  const activeLink = document.getElementById(`nav-${viewId}`);
  if (activeLink) {
    activeLink.classList.add('text-blue-600', 'dark:text-blue-400', 'bg-slate-200/50', 'dark:bg-slate-800/50', 'active');
  }

  // Breadcrumb text
  document.getElementById('header-breadcrumb').innerText = viewId.charAt(0).toUpperCase() + viewId.slice(1);

  // Toggle View Panels
  const panels = document.querySelectorAll('.view-panel');
  panels.forEach(panel => panel.classList.add('hidden'));

  const activePanel = document.getElementById(`view-${viewId}`);
  if (activePanel) {
    activePanel.classList.remove('hidden');
  }

  // Refresh relevant views data dynamically
  if (viewId === 'dashboard') {
    renderDashboardStats();
  } else if (viewId === 'buku') {
    renderBooksCatalog();
  } else if (viewId === 'kategori') {
    renderCategoriesGrid();
  } else if (viewId === 'anggota' && currentUser.ROLE === 'Admin') {
    renderMembersTable();
  } else if (viewId === 'riwayat') {
    renderHistoryTable();
  }
}

function toggleMobileSidebar() {
  const sidebar = document.getElementById('app-sidebar');
  sidebar.classList.toggle('show');
}

// Close sidebar when clicking outside on mobile devices
document.addEventListener('click', (e) => {
  const sidebar = document.getElementById('app-sidebar');
  const toggler = document.querySelector('header button');
  if (window.innerWidth < 992 && sidebar.classList.contains('show') && !sidebar.contains(e.target) && !toggler.contains(e.target)) {
    sidebar.classList.remove('show');
  }
});

// ==================== AUTHENTICATION CONTROLLER ====================

function switchAuthTab(tab) {
  const btnLogin = document.getElementById('tab-login');
  const btnReg = document.getElementById('tab-register');
  const formLogin = document.getElementById('form-login');
  const formRegister = document.getElementById('form-register');

  if (tab === 'login') {
    btnLogin.classList.add('bg-white', 'dark:bg-slate-900', 'shadow-sm', 'text-blue-600', 'dark:text-blue-400');
    btnLogin.classList.remove('text-slate-600', 'dark:text-slate-400');
    btnReg.classList.remove('bg-white', 'dark:bg-slate-900', 'shadow-sm', 'text-blue-600', 'dark:text-blue-400');
    btnReg.classList.add('text-slate-600', 'dark:text-slate-400');
    
    formLogin.classList.remove('hidden');
    formRegister.classList.add('hidden');
    document.getElementById('login-title').innerText = "Pustaka Premium";
  } else {
    btnReg.classList.add('bg-white', 'dark:bg-slate-900', 'shadow-sm', 'text-blue-600', 'dark:text-blue-400');
    btnReg.classList.remove('text-slate-600', 'dark:text-slate-400');
    btnLogin.classList.remove('bg-white', 'dark:bg-slate-900', 'shadow-sm', 'text-blue-600', 'dark:text-blue-400');
    btnLogin.classList.add('text-slate-600', 'dark:text-slate-400');
    
    formRegister.classList.remove('hidden');
    formLogin.classList.add('hidden');
    document.getElementById('login-title').innerText = "Daftar Akun Baru";
  }
}

function previewRegFoto(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('reg-foto-preview-container').classList.remove('hidden');
      document.getElementById('reg-foto-preview').src = e.target.result;
    }
    reader.readAsDataURL(input.files[0]);
  }
}

function handleLoginSubmit(event) {
  event.preventDefault();
  const user = document.getElementById('login-username').value.trim();
  const pass = document.getElementById('login-password').value.trim();
  const remember = document.getElementById('remember-me').checked;

  document.getElementById('global-loader').classList.remove('hidden');

  callBackend('loginUser', [user, pass], (res) => {
    document.getElementById('global-loader').classList.add('hidden');
    
    if (res.success) {
      currentUser = res.user;
      
      // Store session
      if (remember) {
        localStorage.setItem('pustaka_user', JSON.stringify(currentUser));
      } else {
        sessionStorage.setItem('pustaka_user', JSON.stringify(currentUser));
      }
      
      showToast("Berhasil Masuk", `Selamat datang kembali, ${currentUser.NAMA}!`, "success");
      setupAppLayout();
    } else {
      showToast("Gagal Masuk", res.message, "danger");
    }
  });
}

function handleRegisterSubmit(event) {
  event.preventDefault();
  const nama = document.getElementById('reg-nama').value.trim();
  const username = document.getElementById('reg-username').value.trim();
  const password = document.getElementById('reg-password').value.trim();
  const kelas = document.getElementById('reg-kelas').value.trim();
  const fotoInput = document.getElementById('reg-foto');

  const userData = { NAMA: nama, USERNAME: username, PASSWORD: password, KELAS: kelas, ROLE: "Pembaca" };

  document.getElementById('global-loader').classList.remove('hidden');

  if (fotoInput.files && fotoInput.files[0]) {
    const file = fotoInput.files[0];
    const reader = new FileReader();
    reader.onload = function(e) {
      userData.PHOTO_BASE64 = e.target.result;
      userData.PHOTO_MIME = file.type;
      submitRegistration(userData);
    };
    reader.readAsDataURL(file);
  } else {
    submitRegistration(userData);
  }
}

function submitRegistration(userData) {
  callBackend('registerUser', [userData], (res) => {
    document.getElementById('global-loader').classList.add('hidden');
    if (res.success) {
      showToast("Daftar Berhasil", "Silakan masuk menggunakan akun baru Anda!", "success");
      document.getElementById('form-register').reset();
      document.getElementById('reg-foto-preview-container').classList.add('hidden');
      switchAuthTab('login');
    } else {
      showToast("Pendaftaran Gagal", res.message, "danger");
    }
  });
}

function handleLogout() {
  sessionStorage.removeItem('pustaka_user');
  localStorage.removeItem('pustaka_user');
  currentUser = null;
  
  showToast("Logged Out", "Sesi Anda telah berakhir secara aman.", "info");
  
  // Transition smoothly to login screen
  document.getElementById('app-viewport').classList.add('hidden');
  document.getElementById('auth-viewport').classList.remove('hidden');
  
  // Clear forms
  document.getElementById('form-login').reset();
}

// ==================== PROFILE CONTROL ====================

function openProfileModal() {
  document.getElementById('profile-modal').classList.remove('hidden');
  document.getElementById('prof-nama-input').value = currentUser.NAMA;
  document.getElementById('prof-kelas-input').value = currentUser.KELAS;
}

function closeProfileModal() {
  document.getElementById('profile-modal').classList.add('hidden');
  document.getElementById('form-profile').reset();
}

function previewProfileFoto(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('prof-avatar-preview').src = e.target.result;
    }
    reader.readAsDataURL(input.files[0]);
  }
}

function handleProfileSubmit(event) {
  event.preventDefault();
  const nama = document.getElementById('prof-nama-input').value.trim();
  const kelas = document.getElementById('prof-kelas-input').value.trim();
  const password = document.getElementById('prof-password-input').value.trim();
  const fotoInput = document.getElementById('prof-foto-file');

  const updateData = { NAMA: nama, KELAS: kelas };
  if (password) updateData.PASSWORD = password;

  document.getElementById('global-loader').classList.remove('hidden');

  if (fotoInput.files && fotoInput.files[0]) {
    const file = fotoInput.files[0];
    const reader = new FileReader();
    reader.onload = function(e) {
      updateData.PHOTO_BASE64 = e.target.result;
      updateData.PHOTO_MIME = file.type;
      submitProfileUpdate(updateData);
    };
    reader.readAsDataURL(file);
  } else {
    submitProfileUpdate(updateData);
  }
}

function submitProfileUpdate(updateData) {
  callBackend('updateProfile', [currentUser.ID_USER, updateData], (res) => {
    document.getElementById('global-loader').classList.add('hidden');
    if (res.success) {
      showToast("Berhasil", "Profil diperbarui! Memuat ulang sesi...", "success");
      closeProfileModal();
      
      // Update local storage object fields
      currentUser.NAMA = updateData.NAMA;
      currentUser.KELAS = updateData.KELAS;
      
      // Request updated user fields
      callBackend('getMembers', [], (mRes) => {
        if (mRes.success) {
          const fresh = mRes.data.find(u => u.ID_USER === currentUser.ID_USER);
          if (fresh) {
            currentUser = fresh;
            if (localStorage.getItem('pustaka_user')) {
              localStorage.setItem('pustaka_user', JSON.stringify(currentUser));
            } else {
              sessionStorage.setItem('pustaka_user', JSON.stringify(currentUser));
            }
            setupAppLayout();
          }
        }
      });
    } else {
      showToast("Gagal", res.message, "danger");
    }
  });
}

// ==================== SYNCHRONIZE DATA ====================

function syncData() {
  document.getElementById('global-loader').classList.remove('hidden');
  
  // Call parallel/cascade data loaders
  callBackend('getCategories', [], (catRes) => {
    if (catRes.success) {
      cacheCategories = catRes.data;
      renderCategoriesGrid();
      populateCategoryDropdowns();
    }
    
    callBackend('getBooks', [], (bkRes) => {
      if (bkRes.success) {
        cacheBooks = bkRes.data;
        renderBooksCatalog();
      }
      
      callBackend('getHistory', [], (histRes) => {
        if (histRes.success) {
          cacheHistory = histRes.data;
          renderHistoryTable();
        }
        
        if (currentUser.ROLE === 'Admin') {
          callBackend('getMembers', [], (memRes) => {
            document.getElementById('global-loader').classList.add('hidden');
            if (memRes.success) {
              cacheMembers = memRes.data;
              renderMembersTable();
            }
            renderDashboardStats();
          });
        } else {
          document.getElementById('global-loader').classList.add('hidden');
          renderDashboardStats();
        }
      });
    });
  });
}

// ==================== DASHBOARD & CHARTS ====================

let statsChart = null;

function renderDashboardStats() {
  // Counters
  document.getElementById('stat-total-buku').innerText = cacheBooks.length;
  document.getElementById('stat-total-anggota').innerText = cacheMembers.length || cacheBooks.length * 2; // simulated/actual count
  
  const totalReads = cacheBooks.reduce((sum, b) => sum + Number(b.JUMLAH_DIBACA || 0), 0);
  document.getElementById('stat-total-dibaca').innerText = totalReads;
  
  // Most Popular book
  if (cacheBooks.length > 0) {
    const sorted = [...cacheBooks].sort((a, b) => Number(b.JUMLAH_DIBACA || 0) - Number(a.JUMLAH_DIBACA || 0));
    document.getElementById('stat-populer-judul').innerText = sorted[0].JUDUL;
    document.getElementById('stat-populer-dibaca').innerText = `${sorted[0].JUMLAH_DIBACA} kali dibaca`;
  }

  // Activity List
  const recentActivities = [...cacheHistory].sort((a, b) => new Date(b.WAKTU_BACA) - new Date(a.WAKTU_BACA)).slice(0, 5);
  const container = document.getElementById('recent-activities-list');
  
  if (recentActivities.length === 0) {
    container.innerHTML = `<div class="text-center py-10 text-slate-400 text-xs">Belum ada aktivitas membaca</div>`;
  } else {
    container.innerHTML = recentActivities.map(act => {
      const time = new Date(act.WAKTU_BACA).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
      return `
        <div class="flex items-start gap-3 p-2 rounded-lg hover:bg-slate-100/50 dark:hover:bg-slate-800/50 transition-all text-xs">
          <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center flex-shrink-0">
            <i class="fas fa-book-open"></i>
          </div>
          <div class="flex-1 min-w-0">
            <h6 class="font-bold text-slate-800 dark:text-white truncate">${act.JUDUL}</h6>
            <p class="text-[10px] text-slate-400">Dibaca oleh <span class="font-semibold text-slate-600 dark:text-slate-300">${act.USER}</span></p>
          </div>
          <span class="text-[10px] text-slate-400 font-semibold">${time}</span>
        </div>
      `;
    }).join('');
  }

  // Draw chart graph using Chart.js
  drawStatisticsChart();
}

function drawStatisticsChart() {
  const ctx = document.getElementById('library-statistics-chart');
  if (!ctx) return;
  
  // Aggregate statistics reads per category
  const categoriesMap = {};
  cacheBooks.forEach(b => {
    categoriesMap[b.KATEGORI] = (categoriesMap[b.KATEGORI] || 0) + Number(b.JUMLAH_DIBACA || 0);
  });
  
  const labels = Object.keys(categoriesMap).length > 0 ? Object.keys(categoriesMap) : ["Petunjuk", "Sains", "Teknologi", "Sastra"];
  const data = Object.keys(categoriesMap).length > 0 ? Object.values(categoriesMap) : [5, 12, 19, 8];

  if (statsChart) statsChart.destroy();
  
  statsChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Jumlah Dibaca',
        data: data,
        backgroundColor: [
          'rgba(59, 130, 246, 0.65)',
          'rgba(16, 185, 129, 0.65)',
          'rgba(244, 63, 94, 0.65)',
          'rgba(245, 158, 11, 0.65)',
          'rgba(139, 92, 246, 0.65)'
        ],
        borderColor: [
          '#3b82f6', '#10b981', '#f43f5e', '#f5980b', '#8b5cf6'
        ],
        borderWidth: 2,
        borderRadius: 8
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: {
          beginAtZero: true,
          grid: { color: 'rgba(148, 163, 184, 0.08)' },
          ticks: { color: '#64748b', font: { family: 'Inter' } }
        },
        x: {
          grid: { display: false },
          ticks: { color: '#64748b', font: { family: 'Inter' } }
        }
      }
    }
  });
}

// ==================== BUKU / CATALOG MANAGEMENT ====================

let bookUploadCoverBase64 = null;
let bookUploadCoverMime = null;
let bookUploadPdfBase64 = null;

function openBookModal(bookId = null) {
  document.getElementById('book-modal').classList.remove('hidden');
  document.getElementById('form-book').reset();
  
  // Clear file previews
  document.getElementById('book-cover-upload-preview').classList.add('hidden');
  document.getElementById('book-cover-upload-preview').src = "";
  document.getElementById('cover-upload-text').innerText = "Klik atau seret gambar cover";
  document.getElementById('pdf-upload-text').innerText = "Pilih atau Drag File PDF buku";
  document.getElementById('pdf-progress-container').classList.add('hidden');
  
  bookUploadCoverBase64 = null;
  bookUploadCoverMime = null;
  bookUploadPdfBase64 = null;

  if (bookId) {
    // Edit Mode
    document.getElementById('book-modal-title').innerText = "Edit Detail Buku";
    document.getElementById('book-id-field').value = bookId;
    
    const bk = cacheBooks.find(b => b.ID_BUKU === bookId);
    if (bk) {
      document.getElementById('book-judul-input').value = bk.JUDUL;
      document.getElementById('book-penulis-input').value = bk.PENULIS;
      document.getElementById('book-penerbit-input').value = bk.PENERBIT;
      document.getElementById('book-tahun-input').value = bk.TAHUN;
      document.getElementById('book-kategori-input').value = bk.KATEGORI;
      document.getElementById('book-status-input').value = bk.STATUS;
      document.getElementById('book-deskripsi-input').value = bk.DESKRIPSI;
      
      if (bk.COVER) {
        document.getElementById('book-cover-upload-preview').classList.remove('hidden');
        document.getElementById('book-cover-upload-preview').src = bk.COVER;
      }
    }
  } else {
    // Add Mode
    document.getElementById('book-modal-title').innerText = "Tambah Buku PDF Baru";
    document.getElementById('book-id-field').value = "";
  }
}

function closeBookModal() {
  document.getElementById('book-modal').classList.add('hidden');
}

function previewBookCoverUpload(input) {
  if (input.files && input.files[0]) {
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = function(e) {
      bookUploadCoverBase64 = e.target.result;
      bookUploadCoverMime = file.type;
      document.getElementById('book-cover-upload-preview').classList.remove('hidden');
      document.getElementById('book-cover-upload-preview').src = e.target.result;
      document.getElementById('cover-upload-text').innerText = file.name;
    }
    reader.readAsDataURL(file);
  }
}

function handleBookPdfUpload(input) {
  if (input.files && input.files[0]) {
    const file = input.files[0];
    if (file.type !== "application/pdf") {
      showToast("Validasi Gagal", "File harus berformat PDF!", "warning");
      input.value = "";
      return;
    }
    
    const progressContainer = document.getElementById('pdf-progress-container');
    const progressBar = document.getElementById('pdf-progress-bar');
    
    progressContainer.classList.remove('hidden');
    progressBar.style.width = "0%";
    
    const reader = new FileReader();
    
    // Simulate loading progress bar cleanly
    let p = 0;
    const interval = setInterval(() => {
      p += 15;
      if (p >= 90) clearInterval(interval);
      progressBar.style.width = `${p}%`;
    }, 100);

    reader.onload = function(e) {
      clearInterval(interval);
      progressBar.style.width = "100%";
      bookUploadPdfBase64 = e.target.result;
      document.getElementById('pdf-upload-text').innerText = `PDF Siap: ${file.name}`;
      showToast("Berhasil", "Berkas PDF siap diunggah ke Drive!", "success");
    }
    reader.readAsDataURL(file);
  }
}

function handleBookSubmit(event) {
  event.preventDefault();
  const bookId = document.getElementById('book-id-field').value;
  
  const bookData = {
    JUDUL: document.getElementById('book-judul-input').value.trim(),
    PENULIS: document.getElementById('book-penulis-input').value.trim(),
    PENERBIT: document.getElementById('book-penerbit-input').value.trim(),
    TAHUN: document.getElementById('book-tahun-input').value.trim(),
    KATEGORI: document.getElementById('book-kategori-input').value,
    STATUS: document.getElementById('book-status-input').value,
    DESKRIPSI: document.getElementById('book-deskripsi-input').value.trim()
  };

  if (bookUploadCoverBase64) {
    bookData.COVER_BASE64 = bookUploadCoverBase64;
    bookData.COVER_MIME = bookUploadCoverMime;
  }
  
  if (bookUploadPdfBase64) {
    bookData.PDF_BASE64 = bookUploadPdfBase64;
  }

  document.getElementById('global-loader').classList.remove('hidden');

  const action = bookId ? 'editBook' : 'addBook';
  const args = bookId ? [bookId, bookData] : [bookData];

  callBackend(action, args, (res) => {
    document.getElementById('global-loader').classList.add('hidden');
    if (res.success) {
      showToast("Sukses", res.message, "success");
      closeBookModal();
      syncData();
    } else {
      showToast("Gagal", res.message, "danger");
    }
  });
}

function deleteBookAction(bookId) {
  if (confirm("Apakah Anda yakin ingin menghapus buku ini secara permanen dari database?")) {
    document.getElementById('global-loader').classList.remove('hidden');
    callBackend('deleteBook', [bookId], (res) => {
      document.getElementById('global-loader').classList.add('hidden');
      if (res.success) {
        showToast("Dihapus", res.message, "success");
        closeBookDetailModal();
        syncData();
      } else {
        showToast("Gagal", res.message, "danger");
      }
    });
  }
}

// Rendering Books list catalog
function renderBooksCatalog() {
  const grid = document.getElementById('books-catalog-grid');
  if (!grid) return;

  const searchQuery = document.getElementById('search-book-input').value.toLowerCase();

/**
 * Client side PNG conversion and downloads
 */
function downloadIdCardPng() {
  if (!selectedCardUser) return;
  showToast("Mengunduh", "Mempersiapkan gambar kartu digital...", "info");
  
  const card = document.getElementById('digital-id-card');
  
  // Standard Client-side canvas printing for download
  const canvas = document.createElement('canvas');
  canvas.width = 700;
  canvas.height = 440;
  const ctx = canvas.getContext('2d');
  
  // Renders beautiful card graphics client-side
  const gradient = ctx.createLinearGradient(0, 0, 700, 440);
  gradient.addColorStop(0, '#1e3a8a');
  gradient.addColorStop(1, '#0d1b3e');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 700, 440);
  
  // Outer Border
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
  ctx.lineWidth = 4;
  ctx.strokeRect(4, 4, 692, 432);
  
  // Typography
  ctx.fillStyle = '#60a5fa';
  ctx.font = 'bold 24px Poppins, Inter, Arial';
  ctx.fillText(appSettings.libraryName.toUpperCase(), 30, 50);
  
  ctx.fillStyle = '#94a3b8';
  ctx.font = 'bold 14px Inter, Arial';
  ctx.fillText("KARTU ANGGOTA DIGITAL", 480, 50);
  
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(30, 70);
  ctx.lineTo(670, 70);
  ctx.stroke();

  // User Photo drawing placeholder or avatar
  const avatarImg = new Image();
  avatarImg.crossOrigin = "anonymous";
  
  avatarImg.onload = function() {
    // Draw rounded clipping path for profile
    ctx.save();
    ctx.beginPath();
    ctx.arc(100, 180, 60, 0, Math.PI * 2, true);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(avatarImg, 40, 120, 120, 120);
    ctx.restore();
    
    // Draw user info text
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 26px Poppins, Inter, Arial';
    ctx.fillText(selectedCardUser.NAMA, 190, 170);

// ==================== PDF READER ENGINE ====================

function openReader(pdfUrl, bookId, bookTitle, bookAuthor) {
  if (pdfIsLoading) return;
  
  pdfCurrentBookId = bookId;
  pdfCurrentBookTitle = bookTitle;
  document.getElementById('reader-book-title').innerText = bookTitle;
  document.getElementById('reader-book-author').innerText = `Karya: ${bookAuthor}`;

  // Reset bookmark styling state
  document.getElementById('btn-reader-bookmark').classList.remove('text-rose-500');

  // Change View to PDF Reader
  navigateTo('reader');
  
  // Show loading overlay
  document.getElementById('pdf-loading-overlay').classList.remove('hidden');
  pdfIsLoading = true;

  // Retrieve bookmark page memory from localStorage
  const savedPage = localStorage.getItem(`pustaka_read_page_${currentUser.ID_USER}_${bookId}`);
  pdfPageNum = savedPage ? parseInt(savedPage) : 1;

  // Validate pdf link
  if (!pdfUrl || pdfUrl.trim() === "") {
    showToast("Gagal Membaca", "Link berkas PDF kosong atau tidak valid!", "danger");
    document.getElementById('pdf-loading-overlay').classList.add('hidden');
    pdfIsLoading = false;
    navigateTo('buku');
    return;
  }

  // Handle PDF loading using pdf.js
  pdfjsLib.getDocument(pdfUrl).promise.then(function(pdfDoc_) {
    pdfDoc = pdfDoc_;
    document.getElementById('pdf-total-pages').innerText = pdfDoc.numPages;
    
    // Bounds validation
    if (pdfPageNum > pdfDoc.numPages) pdfPageNum = 1;
    
    // Draw page
    renderPdfPage(pdfPageNum);
    
    // Check bookmark state
    checkBookmarkState();

    // Increment read counter in DB
    callBackend('incrementReadCount', [bookId], () => {
      // Register activity log in RIWAYAT_BACA sheet
      callBackend('addHistory', [currentUser.NAMA, bookId, bookTitle], () => {});
    });

  }).catch(function(error) {
    console.error("PDF.js loading error: ", error);
    showToast("PDF Error", "Gagal memuat dokumen PDF: " + error.message, "danger");
    document.getElementById('pdf-loading-overlay').classList.add('hidden');
    pdfIsLoading = false;
    navigateTo('buku');
  });
}

function renderPdfPage(num) {
  if (!pdfDoc) return;
  pdfIsLoading = true;
  document.getElementById('pdf-loading-overlay').classList.remove('hidden');
  document.getElementById('pdf-current-page').innerText = num;

  // Save current page to reader memory
  localStorage.setItem(`pustaka_read_page_${currentUser.ID_USER}_${pdfCurrentBookId}`, num);

  pdfDoc.getPage(num).then(function(page) {
    const viewport = page.getViewport({ scale: pdfScale });
    pdfCanvas.height = viewport.height;
    pdfCanvas.width = viewport.width;

    const renderContext = {
      canvasContext: pdfCtx,
      viewport: viewport
    };
    
    page.render(renderContext).promise.then(function() {
      pdfIsLoading = false;
      document.getElementById('pdf-loading-overlay').classList.add('hidden');
    });
  });
}

function pdfPrevPage() {
  if (!pdfDoc || pdfPageNum <= 1 || pdfIsLoading) return;
  pdfPageNum--;
  renderPdfPage(pdfPageNum);
  checkBookmarkState();
}

function pdfNextPage() {
  if (!pdfDoc || pdfPageNum >= pdfDoc.numPages || pdfIsLoading) return;
  pdfPageNum++;
  renderPdfPage(pdfPageNum);
  checkBookmarkState();
}

function pdfZoomOut() {
  if (pdfScale <= 0.5) return;
  pdfScale -= 0.25;
  document.getElementById('pdf-zoom-level').innerText = `${Math.round(pdfScale * 100)}%`;
  renderPdfPage(pdfPageNum);
}

function pdfZoomIn() {
  if (pdfScale >= 3.0) return;
  pdfScale += 0.25;
  document.getElementById('pdf-zoom-level').innerText = `${Math.round(pdfScale * 100)}%`;
  renderPdfPage(pdfPageNum);
}

function togglePdfBookmark() {
  if (!pdfCurrentBookId) return;
  const bookmarkKey = `pustaka_bookmark_${currentUser.ID_USER}_${pdfCurrentBookId}`;
  const bookmarks = JSON.parse(localStorage.getItem(bookmarkKey) || "[]");
  
  const index = bookmarks.indexOf(pdfPageNum);
  if (index === -1) {
    bookmarks.push(pdfPageNum);
    localStorage.setItem(bookmarkKey, JSON.stringify(bookmarks));
    showToast("Bookmark Disimpan", `Halaman ${pdfPageNum} berhasil ditandai!`, "success");
    document.getElementById('btn-reader-bookmark').classList.add('text-rose-500');
  } else {
    bookmarks.splice(index, 1);
    localStorage.setItem(bookmarkKey, JSON.stringify(bookmarks));
    showToast("Bookmark Dihapus", `Penanda halaman ${pdfPageNum} dihapus.`, "info");
    document.getElementById('btn-reader-bookmark').classList.remove('text-rose-500');
  }
}

function checkBookmarkState() {
  if (!pdfCurrentBookId) return;
  const bookmarkKey = `pustaka_bookmark_${currentUser.ID_USER}_${pdfCurrentBookId}`;
  const bookmarks = JSON.parse(localStorage.getItem(bookmarkKey) || "[]");
  
  const btn = document.getElementById('btn-reader-bookmark');
  if (bookmarks.includes(pdfPageNum)) {
    btn.classList.add('text-rose-500');
  } else {
    btn.classList.remove('text-rose-500');
  }
}

      reader.onload = function(e) {

          document.getElementById('global-loader').classList.add('hidden');

// ==================== GAS BACKEND API WRAPPER / LOCAL STORAGE OFFLINE FALLBACK ====================

/**
 * Executes a backend function via google.script.run.
 * If running locally outside of the Google Apps Script container, it automatically 
 * falls back to a complete simulated LocalStorage API database for instant debugging!
 */
function callBackend(funcName, args, callback) {
  // If running inside Google Apps Script iframe environment
  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(function(response) {
        callback(response);
      })
      .withFailureHandler(function(error) {
        console.error("GAS execution failure on " + funcName + ": ", error);
        showToast("Kesalahan Jaringan", "Koneksi Apps Script terputus: " + error.message, "danger");
        callback({ success: false, message: error.message });
      })[funcName].apply(null, args);
  } else {
    // Run Simulated Mock Backend client-side for zero-error instant desktop testing!
    console.info(`[MOCK DB RUN] Invoking: ${funcName}`, args);
    setTimeout(() => {
      try {
        const res = mockBackendDatabase(funcName, args);
        callback(res);
      } catch (err) {
        console.error("Mock Execution failure: ", err);
        callback({ success: false, message: err.message });
      }
    }, 500);
  }
}

      Object.assign(books[idx], args[1]);
      if (args[1].COVER_BASE64) books[idx].COVER = args[1].COVER_BASE64;
      if (args[1].PDF_BASE64) books[idx].LINK_PDF = "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf";
      
      localStorage.setItem('mock_BUKU', JSON.stringify(books));
      return { success: true, message: "Buku berhasil diperbarui!" };
    }
    case 'deleteBook': {
      const idx = books.findIndex(x => x.ID_BUKU === args[0]);
      if (idx === -1) return { success: false, message: "Buku tidak ditemukan!" };
      
      books.splice(idx, 1);
      localStorage.setItem('mock_BUKU', JSON.stringify(books));
      return { success: true, message: "Buku berhasil dihapus!" };
    }
    case 'incrementReadCount': {
      const idx = books.findIndex(x => x.ID_BUKU === args[0]);
      if (idx !== -1) {
        books[idx].JUMLAH_DIBACA = Number(books[idx].JUMLAH_DIBACA || 0) + 1;
        localStorage.setItem('mock_BUKU', JSON.stringify(books));
      }
      return { success: true };
    }
    case 'getCategories': {
      return { success: true, data: categories };
    }
    case 'addCategory': {
      const newId = "CAT-" + String(categories.length + 1).padStart(3, '0');
      categories.push({
        ID_KATEGORI: newId,
        NAMA_KATEGORI: args[0].NAMA_KATEGORI,
        ICON: args[0].ICON,
        WARNA: args[0].WARNA
      });
      localStorage.setItem('mock_KATEGORI', JSON.stringify(categories));
      return { success: true, message: "Kategori berhasil ditambahkan!" };
    }
    case 'editCategory': {
      const idx = categories.findIndex(x => x.ID_KATEGORI === args[0]);
      if (idx === -1) return { success: false, message: "Kategori tidak ditemukan!" };
      
      Object.assign(categories[idx], args[1]);
      localStorage.setItem('mock_KATEGORI', JSON.stringify(categories));
      return { success: true, message: "Kategori berhasil diperbarui!" };
    }
    case 'deleteCategory': {
      const idx = categories.findIndex(x => x.ID_KATEGORI === args[0]);
      if (idx === -1) return { success: false, message: "Kategori tidak ditemukan!" };
      
      categories.splice(idx, 1);
      localStorage.setItem('mock_KATEGORI', JSON.stringify(categories));
      return { success: true, message: "Kategori berhasil dihapus!" };
    }
    case 'getMembers': {
      const list = users.map(u => {
        const copy = Object.assign({}, u);
        delete copy.PASSWORD;
        return copy;
      });
      return { success: true, data: list };
    }
    case 'addMember': {
      const exists = users.some(x => x.USERNAME.toLowerCase() === args[0].USERNAME.toLowerCase());
      if (exists) return { success: false, message: "Username sudah digunakan!" };
      
      const newId = "USR-" + String(users.length + 1).padStart(3, '0');
      users.push({
        ID_USER: newId,
        NAMA: args[0].NAMA,
        USERNAME: args[0].USERNAME,
        PASSWORD: args[0].PASSWORD || "pembaca123",
        ROLE: args[0].ROLE || "Pembaca",
        KELAS: args[0].KELAS,
        FOTO: args[0].PHOTO_BASE64 || "",
        STATUS: args[0].STATUS || "Aktif",
        TANGGAL_DAFTAR: new Date().toISOString()
      });
      localStorage.setItem('mock_USERS', JSON.stringify(users));
      return { success: true, message: "Anggota berhasil ditambahkan!" };
    }
    case 'editMember': {
      const idx = users.findIndex(x => x.ID_USER === args[0]);
      if (idx === -1) return { success: false, message: "Anggota tidak ditemukan!" };
      
      Object.assign(users[idx], args[1]);
      if (args[1].PASSWORD) users[idx].PASSWORD = args[1].PASSWORD;
      if (args[1].PHOTO_BASE64) users[idx].FOTO = args[1].PHOTO_BASE64;
      
      localStorage.setItem('mock_USERS', JSON.stringify(users));
      return { success: true, message: "Anggota berhasil diperbarui!" };
    }
    case 'deleteMember': {
      const idx = users.findIndex(x => x.ID_USER === args[0]);
      if (idx === -1) return { success: false, message: "Anggota tidak ditemukan!" };
      
      users.splice(idx, 1);
      localStorage.setItem('mock_USERS', JSON.stringify(users));
      return { success: true, message: "Anggota berhasil dihapus!" };
    }
    case 'resetMemberPassword': {
      const idx = users.findIndex(x => x.ID_USER === args[0]);
      if (idx !== -1) {
        users[idx].PASSWORD = "pembaca123";
        localStorage.setItem('mock_USERS', JSON.stringify(users));
      }
      return { success: true };
    }
    case 'getHistory': {
      return { success: true, data: history };
    }
    case 'addHistory': {
      const newId = "RWY-" + String(history.length + 1).padStart(4, '0');
      history.push({
        ID: newId,
        USER: args[0],
        ID_BUKU: args[1],
        JUDUL: args[2],
        WAKTU_BACA: new Date().toISOString()
      });
      localStorage.setItem('mock_RIWAYAT_BACA', JSON.stringify(history));
      return { success: true };
    }
    case 'backupDatabase': {
      const snapshot = {
        USERS: users,
        BUKU: books,
        KATEGORI: categories,
        RIWAYAT_BACA: history,
        backupTime: new Date().toISOString()
      };
      const str = JSON.stringify(snapshot, null, 2);
      return { success: true, backupData: str };
    }
    case 'restoreDatabase': {
      const restored = JSON.parse(args[0]);
      if (restored.USERS) localStorage.setItem('mock_USERS', JSON.stringify(restored.USERS));
      if (restored.BUKU) localStorage.setItem('mock_BUKU', JSON.stringify(restored.BUKU));
      if (restored.KATEGORI) localStorage.setItem('mock_KATEGORI', JSON.stringify(restored.KATEGORI));
      if (restored.RIWAYAT_BACA) localStorage.setItem('mock_RIWAYAT_BACA', JSON.stringify(restored.RIWAYAT_BACA));
      return { success: true, message: "Database offline berhasil dipulihkan!" };
    }
  }
}
