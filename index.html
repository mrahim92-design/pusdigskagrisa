<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perpustakaan Digital SMK PGRI 1 Surabaya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gojekGreen: '#00aa13',
                        gojekDark: '#00880f',
                        gojekText: '#1c1c1c',
                        gojekBg: '#f5f5f5',
                        gojekRed: '#ee2737',
                        gojekBlue: '#00a5cf'
                    }
                }
            }
        }
    </script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gojekBg text-gojekText min-h-screen flex flex-col font-sans">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50 no-print border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-gojekGreen p-2 rounded-full text-white w-10 h-10 flex items-center justify-center">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <span class="text-xl font-bold">Perpustakaan <span class="text-gojekGreen">PGRI 1</span></span>
            </div>
            <div class="hidden md:flex space-x-2 bg-gray-100 p-1 rounded-full">
                <button onclick="switchTab('dashboard')" class="nav-btn px-4 py-2 rounded-full text-sm font-semibold">Beranda</button>
                <button onclick="switchTab('katalog')" class="nav-btn px-4 py-2 rounded-full text-sm font-semibold">Eksplor</button>
                <button onclick="switchTab('kartu')" class="nav-btn px-4 py-2 rounded-full text-sm font-semibold">Kartu</button>
                <button onclick="switchTab('admin')" class="nav-btn px-4 py-2 rounded-full text-sm font-semibold">Kelola</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-5xl w-full mx-auto px-4 py-6">
        <!-- Dashboard Tab -->
        <section id="tab-dashboard" class="tab-content block">
            <div class="bg-white rounded-3xl p-6 shadow-sm mb-8">
                <h3 class="font-bold text-lg mb-4">Statistik Perpustakaan</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                    <div class="p-4 bg-green-50 rounded-2xl"><p class="text-xs text-gray-600">Total Buku</p><p class="font-bold text-xl" id="stat-total">0</p></div>
                    <div class="p-4 bg-blue-50 rounded-2xl"><p class="text-xs text-gray-600">Tersedia</p><p class="font-bold text-xl" id="stat-tersedia">0</p></div>
                    <div class="p-4 bg-red-50 rounded-2xl"><p class="text-xs text-gray-600">Dipinjam</p><p class="font-bold text-xl" id="stat-dipinjam">0</p></div>
                    <div class="p-4 bg-orange-50 rounded-2xl"><p class="text-xs text-gray-600">Kategori</p><p class="font-bold text-xl" id="stat-kategori">0</p></div>
                </div>
            </div>
        </section>

        <!-- Kartu Tab -->
        <section id="tab-kartu" class="tab-content hidden">
            <div class="grid md:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm">
                    <h2 class="font-bold mb-4">Isi Data Anggota</h2>
                    <div class="space-y-4">
                        <input type="text" id="inp-nama" placeholder="Nama Siswa" class="w-full p-3 bg-gray-50 rounded-xl border">
                        <input type="text" id="inp-kelas" placeholder="Kelas" class="w-full p-3 bg-gray-50 rounded-xl border">
                        <input type="text" id="inp-nisn" placeholder="NISN" class="w-full p-3 bg-gray-50 rounded-xl border">
                    </div>
                </div>
                <div id="print-area" class="bg-gojekGreen p-6 rounded-3xl text-white shadow-lg">
                    <h2 class="text-xl font-bold">KARTU ANGGOTA</h2>
                    <p class="text-sm opacity-80">SMK PGRI 1 SURABAYA</p>
                    <div class="mt-6 space-y-2 text-sm">
                        <p>Nama: <span id="prev-nama" class="font-bold">...</span></p>
                        <p>Kelas: <span id="prev-kelas" class="font-bold">...</span></p>
                        <p>NISN: <span id="prev-nisn" class="font-bold">...</span></p>
                    </div>
                    <button onclick="window.print()" class="mt-6 w-full bg-white text-gojekGreen py-2 rounded-full font-bold">Cetak Kartu</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Logika Tab
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
        }

        // Sinkronisasi Input ke Kartu
        document.getElementById('inp-nama').addEventListener('input', (e) => document.getElementById('prev-nama').innerText = e.target.value);
        document.getElementById('inp-kelas').addEventListener('input', (e) => document.getElementById('prev-kelas').innerText = e.target.value);
        document.getElementById('inp-nisn').addEventListener('input', (e) => document.getElementById('prev-nisn').innerText = e.target.value);

        // Simulasi Data Awal
        const books = [
            { judul: "Pemrograman Web", kategori: "Pelajaran", isBorrowed: false },
            { judul: "Laskar Pelangi", kategori: "Fiksi", isBorrowed: true }
        ];

        function updateStats() {
            document.getElementById('stat-total').innerText = books.length;
            document.getElementById('stat-dipinjam').innerText = books.filter(b => b.isBorrowed).length;
            document.getElementById('stat-tersedia').innerText = books.filter(b => !b.isBorrowed).length;
            document.getElementById('stat-kategori').innerText = new Set(books.map(b => b.kategori)).size;
        }

        updateStats();
    </script>
</body>
</html>
