<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Perpustakaan Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .hidden { display: none; }
        .card-size { width: 330px; height: 200px; }
    </style>
</head>
<body class="bg-gray-50 p-4">

    <!-- Login Form -->
    <div id="login-screen" class="max-w-md mx-auto mt-20 p-6 bg-white rounded-xl shadow-lg">
        <h2 class="text-xl font-bold mb-4">Login Petugas</h2>
        <input type="text" id="username" placeholder="Username" class="w-full p-2 border mb-2">
        <input type="password" id="password" placeholder="Password" class="w-full p-2 border mb-4">
        <button onclick="login()" class="w-full bg-green-600 text-white p-2 rounded">Masuk</button>
    </div>

    <!-- Main Content -->
    <div id="main-app" class="hidden max-w-4xl mx-auto">
        <nav class="flex gap-4 mb-6">
            <button onclick="showTab('dashboard')" class="px-4 py-2 bg-white rounded-lg shadow">Dashboard</button>
            <button onclick="showTab('katalog')" class="px-4 py-2 bg-white rounded-lg shadow">Katalog</button>
            <button onclick="showTab('kartu')" class="px-4 py-2 bg-white rounded-lg shadow">Data Siswa</button>
        </nav>

        <!-- Tab Dashboard -->
        <div id="tab-dashboard" class="tab-content">
            <h2 class="text-2xl font-bold mb-4">Dashboard</h2>
            <div class="mb-8">
                <h3 class="font-bold mb-3">Buku Favorit</h3>
                <div class="flex gap-4 overflow-x-auto">
                    <div class="card-size bg-white p-4 rounded-xl border">Buku A</div>
                    <div class="card-size bg-white p-4 rounded-xl border">Buku B</div>
                </div>
            </div>
        </div>

        <!-- Tab Katalog -->
        <div id="tab-katalog" class="tab-content hidden">
            <h2 class="text-2xl font-bold mb-4">Katalog Buku</h2>
            <div id="katalog-list" class="grid grid-cols-2 gap-4">
                <div class="p-4 bg-white rounded-lg border flex justify-between">
                    <div>
                        <p class="font-bold">Judul Buku</p>
                        <p class="text-sm">Penulis</p>
                    </div>
                    <div class="flex flex-col gap-1">
                        <button class="bg-gray-100 px-3 py-1 rounded text-xs">Baca</button>
                        <button class="bg-green-600 text-white px-3 py-1 rounded text-xs">Pinjam</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab Data Siswa -->
        <div id="tab-kartu" class="tab-content hidden">
            <h2 class="text-2xl font-bold mb-4">Upload Data Siswa</h2>
            <input type="file" id="upload-excel" class="mb-4" onchange="processExcel(event)">
            <table class="w-full bg-white text-left">
                <thead><tr class="border-b"><th>Nama</th><th>Kelas</th></tr></thead>
                <tbody id="siswa-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
        }

        function login() {
            const user = document.getElementById('username').value;
            if(user === "Admin") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            } else { alert("Login Gagal"); }
        }

        function processExcel(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheetName = workbook.SheetNames[0];
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);
                
                const tbody = document.getElementById('siswa-table-body');
                tbody.innerHTML = json.map(row => `<tr><td>${row.Nama}</td><td>${row.Kelas}</td></tr>`).join('');
            };
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
