<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perpustakaan Digital SMK PGRI 1 Surabaya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SheetJS untuk Upload Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { gojekGreen: '#00aa13', gojekDark: '#00880f', gojekText: '#1c1c1c', gojekBg: '#f5f5f5', gojekRed: '#ee2737', gojekBlue: '#00a5cf' } } } }
    </script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 8.5cm; height: 5.4cm; border: 1px solid #ccc; }
            .no-print { display: none !important; }
        }
        /* Ukuran Kartu KTP */
        .ktp-size { width: 8.5cm; height: 5.4cm; }
    </style>
</head>
<body class="bg-gojekBg text-gojekText min-h-screen">

    <!-- NAVBAR (Tetap dengan struktur Anda) -->
    <nav class="bg-white shadow-sm sticky top-0 z-50 p-4 flex justify-between items-center">
        <span class="font-bold text-lg">Perpustakaan <span class="text-gojekGreen">PGRI 1</span></span>
        <div class="hidden md:flex gap-4">
            <button onclick="switchTab('dashboard')">Beranda</button>
            <button onclick="switchTab('katalog')">Eksplor</button>
            <button onclick="switchTab('kartu')">Kartu</button>
            <button onclick="switchTab('admin')">Kelola</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4">
        
        <!-- DASHBOARD -->
        <section id="tab-dashboard" class="tab-content">
            <h2 class="font-bold text-xl mb-4">Buku Favorit (Slider)</h2>
            <div id="slider" class="flex overflow-x-auto gap-4 pb-4 snap-x">
                <!-- Data dummy slider -->
                <div class="min-w-[200px] bg-white p-4 rounded-xl shadow">Buku Favorit 1</div>
                <div class="min-w-[200px] bg-white p-4 rounded-xl shadow">Buku Favorit 2</div>
            </div>
            
            <h2 class="font-bold text-xl mt-8 mb-4">Buku Baru</h2>
            <div id="new-books-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <!-- 4 buku terbaru -->
                <div class="bg-white p-4 rounded-xl shadow">Buku Baru 1</div>
                <div class="bg-white p-4 rounded-xl shadow">Buku Baru 2</div>
                <div class="bg-white p-4 rounded-xl shadow">Buku Baru 3</div>
                <div class="bg-white p-4 rounded-xl shadow">Buku Baru 4</div>
            </div>
        </section>

        <!-- EKSPLOR -->
        <section id="tab-katalog" class="tab-content hidden">
            <h2 class="font-bold text-xl mb-4">Eksplor Koleksi</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white p-4 rounded-xl shadow">
                    <h3 class="font-bold">Judul Buku</h3>
                    <div class="mt-4 flex gap-2">
                        <button class="bg-blue-500 text-white px-2 py-1 text-xs rounded">Baca</button>
                        <button class="bg-green-500 text-white px-2 py-1 text-xs rounded">Pinjam</button>
                        <button class="bg-gray-500 text-white px-2 py-1 text-xs rounded">Download</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- KARTU -->
        <section id="tab-kartu" class="tab-content hidden">
            <h2 class="font-bold text-xl mb-4">Database Siswa</h2>
            <input type="file" id="upload-excel" class="mb-4" accept=".xlsx, .xls">
            <div class="bg-white p-4 rounded shadow mb-6 overflow-x-auto">
                <table id="siswa-table" class="w-full text-sm">
                    <thead><tr><th>Nama</th><th>Kelas</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div id="print-area" class="ktp-size bg-white border p-2">
                <h3 class="font-bold text-[10px]">KARTU PERPUSTAKAAN</h3>
                <p id="card-nama" class="text-xs font-bold">-</p>
                <p id="card-kelas" class="text-[10px]">-</p>
            </div>
        </section>

        <!-- KELOLA (LOGIN) -->
        <section id="tab-admin" class="tab-content hidden">
            <div id="login-form" class="max-w-sm mx-auto bg-white p-6 rounded shadow">
                <h2 class="font-bold mb-4">Login Akses</h2>
                <input type="text" id="user-in" placeholder="Username" class="w-full border p-2 mb-2">
                <input type="password" id="pw-in" placeholder="Password" class="w-full border p-2 mb-2">
                <button onclick="checkLogin()" class="w-full bg-gojekGreen text-white py-2">Login</button>
            </div>
            <div id="admin-panel" class="hidden">
                <h2 class="font-bold text-xl">Panel Admin/Guru</h2>
                <!-- Form tambah user dll -->
            </div>
        </section>
    </main>

    <script>
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
        }

        function checkLogin() {
            const u = document.getElementById('user-in').value;
            const p = document.getElementById('pw-in').value;
            if ((u === 'Admin' && p === 'Admin123') || (p === 'skagrisa123')) {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                alert('Login Berhasil');
            } else {
                alert('User/Password Salah');
            }
        }

        // Logic Upload Excel
        document.getElementById('upload-excel').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheetName = workbook.SheetNames[0];
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);
                console.log(json); // Data excel siap diolah ke tabel
                alert('Data berhasil diupload!');
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
